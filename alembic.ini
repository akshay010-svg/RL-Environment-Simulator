# A generic, single database configuration.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Uncomment the line below if you want the files to be named in a sortable way.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file.
# Leave blank for local time.
# timezone =

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions directory.
# sourceless = false

# Version path separator; default is "os".
# version_path_separator = os

# The output encoding used when revision files are written.
output_encoding = utf-8

# sqlalchemy.url is set dynamically in env.py from the DATABASE_URL env var.
# sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Hooks to run after a revision is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
